name: Prepare to release

on:
  workflow_dispatch:

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Verify build
        run: mvn -B verify

      - name: Capture snapshot version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ ! "$VERSION" =~ -SNAPSHOT$ ]]; then
            echo "Expected a SNAPSHOT version on main, got: $VERSION"
            exit 1
          fi
          echo "SNAPSHOT_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set release version
        run: mvn -B versions:set -DremoveSnapshot -DgenerateBackupPoms=false

      - name: Capture release version
        run: |
          RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Commit release version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '**/pom.xml'
          git commit -m "Prepare release ${{ env.RELEASE_VERSION }}"

      - name: Create release tag
        run: git tag -a "${{ env.RELEASE_TAG }}" -m "Release ${{ env.RELEASE_VERSION }}"

      - name: Set next snapshot version
        run: mvn -B versions:set -DnextSnapshot -DgenerateBackupPoms=false

      - name: Capture next snapshot version
        run: |
          NEXT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"

      - name: Commit next snapshot version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '**/pom.xml'
          git commit -m "Start ${{ env.NEXT_VERSION }} development"

      - name: Push release commits and tag
        run: |
          git push origin main
          git push origin "${{ env.RELEASE_TAG }}"
