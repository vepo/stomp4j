services:
  artemis:
    image: apache/activemq-artemis:2.30.0
    ports:
      - "61613:61613"
      - "8161:8161"
    environment:
      ARTEMIS_USER: user
      ARTEMIS_PASSWORD: passwd
    volumes:
      - ../client/src/test/resources/broker.xml:/var/lib/artemis-instance/etc-override/broker.xml:ro

  spring-client-sample:
    build:
      context: ..
      dockerfile: samples/spring-client-sample/Dockerfile
    depends_on:
      - artemis
    environment:
      STOMP4J_CLIENT_URL: stomp://artemis:61613
      STOMP4J_CLIENT_USERNAME: user
      STOMP4J_CLIENT_PASSWORD: passwd
    ports:
      - "8080:8080"

  plain-client-sample:
    build:
      context: ..
      dockerfile: samples/plain-client-sample/Dockerfile
    depends_on:
      - artemis
    environment:
      STOMP4J_CLIENT_URL: stomp://artemis:61613
      STOMP4J_CLIENT_USERNAME: user
      STOMP4J_CLIENT_PASSWORD: passwd
      HTTP_PORT: "8082"
    ports:
      - "8082:8082"

  spring-server-sample:
    build:
      context: ..
      dockerfile: samples/spring-server-sample/Dockerfile
    ports:
      - "8081:8081"
      - "5500:5500"
      - "5501:5501"

  plain-server-sample:
    build:
      context: ..
      dockerfile: samples/plain-server-sample/Dockerfile
    environment:
      STOMP_TCP_PORT: "5510"
      STOMP_WS_PORT: "5511"
    ports:
      - "5510:5510"
      - "5511:5511"

  quarkus-client-sample:
    build:
      context: ..
      dockerfile: samples/quarkus-client-sample/Dockerfile
    depends_on:
      - artemis
    environment:
      STOMP4J_CLIENT_URL: stomp://artemis:61613
      STOMP4J_CLIENT_USERNAME: user
      STOMP4J_CLIENT_PASSWORD: passwd
    ports:
      - "8083:8083"

  quarkus-server-sample:
    build:
      context: ..
      dockerfile: samples/quarkus-server-sample/Dockerfile
    ports:
      - "8084:8084"
      - "5520:5520"
      - "5521:5521"

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

  stomp-kafka-bridge:
    build:
      context: ..
      dockerfile: samples/kafka-bridge-sample/Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      STOMP_TCP_PORT: "61613"
      STOMP_WS_PORT: "61614"
      DESTINATION_PREFIX: /topic/
      TOPIC_PREFIX_STRIP: /topic/
      KAFKA_CONSUMER_GROUP_ID: stomp4j-bridge
    ports:
      - "61613:61613"
      - "61614:61614"
